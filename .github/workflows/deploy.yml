name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        id: deploy
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: linli-community
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Show deployment URL
        if: success()
        run: echo "Deployment successful! URL: ${{ steps.deploy.outputs.url }}"

      - name: Debug info on failure
        if: failure()
        run: |
          echo "Deployment failed. Please check:"
          echo "- CLOUDFLARE_API_TOKEN is set: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}"
          echo "- CLOUDFLARE_ACCOUNT_ID is set: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' }}"
          echo "- Check if the Cloudflare Pages project 'linli-community' exists"
          echo "- Ensure API Token has 'Edit Cloudflare Pages' permission"