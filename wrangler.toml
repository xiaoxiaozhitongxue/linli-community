name = "linli-community"
compatibility_date = "2024-01-01"

# Cloudflare Pages 配置
pages_build_output_dir = "dist"

# 注意：这个文件主要用于 Wrangler CLI 直接部署
# 对于 Git 集成部署，请在 Cloudflare Dashboard 配置

# 环境变量
[vars]
APP_NAME = "邻里社区"
APP_VERSION = "1.0.0"

# D1 数据库配置（可选，如需使用数据库请先创建 D1 数据库）
# [[d1_databases]]
# binding = "DB"
# database_name = "linli-community-db"
# database_id = "your-database-id-here"

# KV 命名空间配置（可选，如需使用缓存请先创建 KV）
# [[kv_namespaces]]
# binding = "CACHE"
# id = "your-kv-namespace-id"

# 注意：
# 1. Cloudflare Pages Functions 会自动从 /functions 目录加载
# 2. 如需使用数据库，请先创建 D1 数据库并取消上面 D1 配置的注释
# 3. 构建设置：
#    - 构建命令: npm run build:h5
#    - 输出目录: dist/build/h5
